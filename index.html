<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Kirti</title>

<style>
body{
margin:0;
font-family:Segoe UI;
color:white;
background:black;
overflow-x:hidden;
}

/* Intro */
#intro{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
z-index:999;
animation:fadeOut 3s forwards;
animation-delay:5s;
}
@keyframes fadeOut{to{opacity:0;visibility:hidden;}}

.name{
font-size:50px;
background:linear-gradient(45deg,pink,cyan);
-webkit-background-clip:text;
color:transparent;
animation:glow 2s infinite alternate;
}
@keyframes glow{
from{text-shadow:0 0 10px pink;}
to{text-shadow:0 0 30px cyan;}
}

/* Sections */
section{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
opacity:0;
transform:translateY(50px);
transition:1s;
}
.show{opacity:1; transform:translateY(0);}

#s1{background:linear-gradient(#0f0c29,#302b63);}
#s2{background:linear-gradient(#302b63,#24243e);}
#s3{background:linear-gradient(#24243e,#000);}
#s4{background:linear-gradient(#000,#1a001a);}
#s5{background:#111;}
#s6{background:black;}
#s7{background:black;}

.card{
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:20px;
backdrop-filter:blur(10px);
width:85%;
}

/* Hearts */
.heart{
position:absolute;
color:pink;
animation:float 6s linear infinite;
}
@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-900px); opacity:0;}
}

/* Cake */
.cake{font-size:100px;}
.flame{
width:12px;height:22px;
background:orange;
border-radius:50%;
animation:flicker 0.2s infinite;
margin:auto;
}
@keyframes flicker{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

/* Buttons */
button{
padding:12px 25px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,pink,purple);
color:white;
margin-top:20px;
}

/* Confetti */
.confetti{
position:absolute;
font-size:20px;
animation:fall 3s linear infinite;
}
@keyframes fall{
0%{transform:translateY(-100px);}
100%{transform:translateY(900px);}
}

/* Fireworks */
.firework{
position:absolute;
font-size:25px;
animation:explode 1s linear;
}
@keyframes explode{
0%{transform:scale(0);}
100%{transform:scale(2); opacity:0;}
}
</style>
</head>

<body>

<audio autoplay loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<!-- Intro -->
<div id="intro">
<h1 class="name">Kirti</h1>
<p>Something special is about to begin...</p>
</div>

<!-- Sections -->

<section id="s1"><div class="card">
<h1>Happy Birthday Kirti</h1>
<p id="typing"></p>
</div></section>

<section id="s2"><div class="card">
<h2>You Are Special</h2>
<p>You are one of the most amazing people in my life.</p>
</div></section>

<section id="s3"><div class="card">
<h2>Memory Timeline</h2>
<div>
<p>✨ We met</p>
<p>💬 Started talking</p>
<p>😂 Happp moments</p>
<p>🤝 Best friends</p>
</div>
</div></section>

<section id="s4"><div class="card">
<h2>Why You’re So Special</h2>
<div id="specialText"></div>
</div></section>

<section id="s5"><div class="card">
<h2>Voice Message</h2>
<button onclick="speak()">Play Message</button>
</div></section>

<section id="s6"><div class="card">
<h2>Birthday Cake</h2>
<div class="cake">🎂</div>
<div class="flame" id="flame"></div>
<button onclick="blow()">Blow Candle</button>
<p id="letter"></p>
</div></section>

<section id="s7"><div class="card">
<h1 class="name">Happy Birthday Queen Kirti</h1>
</div></section>

<script>
/* Scroll animation */
window.addEventListener('scroll',()=>{
document.querySelectorAll('section').forEach(sec=>{
if(sec.getBoundingClientRect().top < window.innerHeight - 100){
sec.classList.add('show');
}
});
});

/* Typing intro */
setTimeout(()=>{
let text="Meeting you was one of the best things that ever happened to me.";
let i=0;
function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text[i];
i++;
setTimeout(type,40);
}}
type();
},5000);

/* Hearts */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤";
h.style.left=Math.random()*window.innerWidth+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},500);

/* Special lines */
let lines=[
"You always understand me.",
"You make normal moments special.",
"Your presence matters.",
"You are kind and real.",
"I’m lucky to have you."
];
let index=0;

function showLines(){
if(index<lines.length){
let p=document.createElement("p");
p.innerText=lines[index];
p.style.opacity=0;
p.style.transition="1s";
document.getElementById("specialText").appendChild(p);
setTimeout(()=>p.style.opacity=1,100);
index++;
setTimeout(showLines,2000);
}
}

window.addEventListener("scroll",()=>{
let sec=document.getElementById("s4");
if(sec.getBoundingClientRect().top < window.innerHeight-100){
if(index===0) showLines();
}
});

/* Voice */
function speak(){
let msg=new SpeechSynthesisUtterance("Happy Birthday Kirti. You are very special.");
speechSynthesis.speak(msg);
}

/* Blow candle */
function blow(){
document.getElementById("flame").style.display="none";
confetti();
fireworks();
letter();
}

/* Confetti */
function confetti(){
setInterval(()=>{
let c=document.createElement("div");
c.className="confetti";
c.innerHTML="✨";
c.style.left=Math.random()*window.innerWidth+"px";
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
},200);
}

/* Fireworks */
function fireworks(){
setInterval(()=>{
let f=document.createElement("div");
f.className="firework";
f.innerHTML="🎆";
f.style.left=Math.random()*window.innerWidth+"px";
f.style.top=Math.random()*window.innerHeight+"px";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
},500);
}

/* Final letter */
function letter(){
let text="You are a very special person in my life. I hope you always stay happy and smiling. Happy Birthday Kirti.";
let i=0;
function type(){
if(i<text.length){
document.getElementById("letter").innerHTML+=text[i];
i++;
setTimeout(type,40);
}}
type();
}

/* SECRET TAP */
let taps=0;
document.body.addEventListener("click",()=>{
taps++;
if(taps==5){
alert("You found the secret 😏\nYou mean more to me than you know.");
}
});
</script>

</body>
</html>
