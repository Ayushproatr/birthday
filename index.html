<!DOCTYPE html>
<html>
<head>
    <title>For My Mahila Dost</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 50px;
        }

        button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: pink;
            font-size: 16px;
        }

        input {
            padding: 10px;
            border-radius: 10px;
            border: none;
        }

        .page {
            display: none;
        }
    </style>
</head>
<body>

<div id="start">
    <h1>I made something for you</h1>
    <button onclick="showPassword()">Click to Start</button>
</div>

<div id="passwordPage" class="page">
    <h2>Enter Password</h2>
    <input type="password" id="pass">
    <button onclick="checkPass()">Enter</button>
</div>

<div id="page1" class="page">
    <h2>Happy Birthday!</h2>
    <p>You are a very important person in my life.</p>
    <button onclick="nextPage('page2')">Next</button>
</div>

<div id="page2" class="page">
    <h2>Thank You</h2>
    <p>Thank you for being in my life and making everything better.</p>
    <button onclick="nextPage('page3')">Next</button>
</div>

<div id="page3" class="page">
    <h2>Final Message</h2>
    <p>I am really lucky to have you as my best friend.</p>
</div>

<script>
function showPassword() {
    document.getElementById("start").style.display = "none";
    document.getElementById("passwordPage").style.display = "block";
}

function checkPass() {
    var password = document.getElementById("pass").value;

    if(password == "formymahiladost") {
        document.getElementById("passwordPage").style.display = "none";
        document.getElementById("page1").style.display = "block";
    } else {
        alert("Wrong Password");
    }
}

function nextPage(page) {
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "none";
    document.getElementById("page3").style.display = "none";
    document.getElementById(page).style.display = "block";
}
</script>

</body>
</html>
